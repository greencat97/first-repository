<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Economic Pulse — 3D</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-health: #0a1628;
  --accent: #38bdf8;
  --positive: #22d3ee;
  --negative: #f43f5e;
  --neutral: #94a3b8;
  --text: #e2e8f0;
  --text-dim: #64748b;
  --panel-bg: rgba(10, 22, 40, 0.85);
  --panel-border: rgba(56, 189, 248, 0.12);
  --glow: rgba(56, 189, 248, 0.06);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'DM Mono', monospace;
  color: var(--text);
  background: var(--bg-health);
}

#bg-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

#globe-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
  cursor: grab;
}
#globe-canvas:active { cursor: grabbing; }

.ui-layer {
  position: fixed;
  z-index: 10;
  pointer-events: none;
}
.ui-layer > * { pointer-events: auto; }

/* Header */
.header {
  top: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 24px 32px;
}

.title-block h1 {
  font-family: 'Instrument Serif', serif;
  font-size: 28px;
  font-weight: 400;
  letter-spacing: -0.5px;
  color: var(--text);
}
.title-block .subtitle {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.global-health-badge {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: 12px;
  padding: 12px 20px;
  backdrop-filter: blur(20px);
}
.health-indicator {
  width: 10px; height: 10px;
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 8px currentColor; }
  50% { opacity: 0.5; box-shadow: 0 0 16px currentColor; }
}
.health-label { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
.health-value { font-size: 18px; font-weight: 500; }

/* Market Ticker */
.ticker-strip {
  top: 90px; left: 0; right: 0;
  overflow: hidden;
  height: 36px;
  background: rgba(10, 22, 40, 0.6);
  border-top: 1px solid var(--panel-border);
  border-bottom: 1px solid var(--panel-border);
}
.ticker-track {
  display: flex;
  gap: 40px;
  animation: scroll 60s linear infinite;
  white-space: nowrap;
  padding: 8px 0;
}
@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.ticker-item {
  font-size: 12px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}
.ticker-name { color: var(--text-dim); }
.ticker-value { color: var(--text); font-weight: 500; }
.ticker-change { font-weight: 500; }
.ticker-change.up { color: #22d3ee; }
.ticker-change.down { color: #f43f5e; }
.ticker-sep { color: rgba(148,163,184,0.2); }

/* Left Panel — Country Rankings */
.panel-left {
  top: 140px; left: 24px;
  width: 320px;
  max-height: calc(100vh - 260px);
}
.panel {
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: 16px;
  backdrop-filter: blur(24px);
  overflow: hidden;
}
.panel-header {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--panel-border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.panel-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
}
.panel-toggle {
  display: flex; gap: 2px;
}
.panel-toggle button {
  background: transparent;
  border: 1px solid var(--panel-border);
  color: var(--text-dim);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 4px 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.panel-toggle button:first-child { border-radius: 6px 0 0 6px; }
.panel-toggle button:last-child { border-radius: 0 6px 6px 0; }
.panel-toggle button.active {
  background: rgba(56,189,248,0.15);
  color: var(--accent);
  border-color: var(--accent);
}

.country-list {
  padding: 8px 0;
  max-height: 520px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(56,189,248,0.2) transparent;
}
.country-row {
  display: grid;
  grid-template-columns: 24px 1fr 70px 60px;
  align-items: center;
  padding: 8px 20px;
  gap: 8px;
  transition: background 0.15s;
  cursor: pointer;
}
.country-row:hover { background: rgba(56,189,248,0.05); }
.country-rank { font-size: 10px; color: var(--text-dim); text-align: right; }
.country-name { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.country-gdp { font-size: 11px; color: var(--text-dim); text-align: right; }
.country-growth {
  font-size: 11px;
  font-weight: 500;
  text-align: right;
  padding: 2px 8px;
  border-radius: 4px;
}

/* Right Panel — Markets */
.panel-right {
  top: 140px; right: 24px;
  width: 300px;
}
.market-grid {
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.market-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  align-items: center;
  gap: 12px;
  padding: 8px 8px;
  border-radius: 8px;
  transition: background 0.15s;
}
.market-row:hover { background: rgba(56,189,248,0.05); }
.market-name { font-size: 11px; color: var(--text); }
.market-region { font-size: 9px; color: var(--text-dim); margin-top: 1px; }
.market-price { font-size: 12px; font-weight: 500; text-align: right; }
.market-change {
  font-size: 11px;
  font-weight: 500;
  text-align: right;
  min-width: 60px;
}

/* Bottom Legend */
.legend-bar {
  bottom: 24px; left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: 12px;
  padding: 12px 24px;
  backdrop-filter: blur(20px);
}
.legend-gradient {
  width: 200px;
  height: 10px;
  border-radius: 5px;
  background: linear-gradient(90deg, #f43f5e, #fb923c, #facc15, #a3e635, #22d3ee, #38bdf8);
}
.legend-labels {
  display: flex;
  justify-content: space-between;
  width: 200px;
  margin-top: 3px;
}
.legend-label {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
}
.legend-title {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  writing-mode: vertical-rl;
  transform: rotate(180deg);
}

/* Tooltip */
.tooltip {
  position: fixed;
  z-index: 100;
  background: rgba(10, 22, 40, 0.95);
  border: 1px solid var(--panel-border);
  border-radius: 10px;
  padding: 14px 18px;
  backdrop-filter: blur(20px);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  min-width: 200px;
}
.tooltip.visible { opacity: 1; }
.tooltip-country { font-size: 14px; font-weight: 500; margin-bottom: 8px; }
.tooltip-row { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 4px; }
.tooltip-key { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.tooltip-val { font-size: 12px; font-weight: 500; }

/* Time stamp */
.timestamp {
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1px;
}

/* Responsive */
@media (max-width: 1200px) {
  .panel-left, .panel-right { display: none; }
}

const MARKETS = [

// ===================== UTILITY =====================
function growthToColor(growth) {
  // Smooth gradient: -5% = deep red -> 0% = amber -> 3% = green -> 6%+ = cyan
  const t = Math.max(0, Math.min(1, (growth + 5) / 11));
  const stops = [
    { p: 0.0, r: 244, g: 63, b: 94 },    // -5% rose
    { p: 0.2, r: 251, g: 146, b: 60 },   // -1% orange
    { p: 0.36, r: 250, g: 204, b: 21 },   // 0% amber
    { p: 0.55, r: 163, g: 230, b: 53 },   // +2% lime
    { p: 0.73, r: 34, g: 211, b: 238 },   // +4% cyan
    { p: 1.0, r: 56, g: 189, b: 248 },    // +6% sky
  ];
  let lo = stops[0], hi = stops[stops.length - 1];
  for (let i = 0; i < stops.length - 1; i++) {
    if (t >= stops[i].p && t <= stops[i + 1].p) {
      lo = stops[i]; hi = stops[i + 1];
      break;
    }
  }
  const f = (t - lo.p) / (hi.p - lo.p);
  const r = Math.round(lo.r + (hi.r - lo.r) * f);
  const g = Math.round(lo.g + (hi.g - lo.g) * f);
  const b = Math.round(lo.b + (hi.b - lo.b) * f);
  return { r, g, b, hex: `rgb(${r},${g},${b})` };
}

function growthToThreeColor(growth) {
  const c = growthToColor(growth);
  return new THREE.Color(c.r / 255, c.g / 255, c.b / 255);
}

function latLonToVec3(lat, lon, radius) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -radius * Math.sin(phi) * Math.cos(theta),
    radius * Math.cos(phi),
    radius * Math.sin(phi) * Math.sin(theta)
  );
}

// ===================== BACKGROUND CANVAS =====================
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');

function resizeBg() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}
resizeBg();
window.addEventListener('resize', resizeBg);

// Compute global economic health score: weighted avg of all growth rates
const totalGdp = COUNTRIES.reduce((s, c) => s + c.gdp, 0);
const weightedGrowth = COUNTRIES.reduce((s, c) => s + c.growth * c.gdp, 0) / totalGdp;
const avgMarketChange = MARKETS.reduce((s, m) => s + m.change, 0) / MARKETS.length;

// Background hue shifts based on global state
// positive growth + positive markets = cooler blue-green
// negative = warmer red-amber
function getHealthHue() {
  const score = weightedGrowth * 0.7 + avgMarketChange * 0.3;
  // score range roughly -2 to 5
  // map to hue: 0 (red) to 200 (blue-cyan)
  return Math.max(180, Math.min(220, 180 + score * 8));
}

const healthHue = getHealthHue();
let bgTime = 0;

function drawBackground() {
  bgTime += 0.003;
  const w = bgCanvas.width, h = bgCanvas.height;

  // Dynamic nebula background reflecting economic health
  const baseH = healthHue;
  const grad = bgCtx.createRadialGradient(w * 0.5, h * 0.5, 0, w * 0.5, h * 0.5, w * 0.7);
  const saturation = 60 + Math.sin(bgTime) * 10;
  grad.addColorStop(0, `hsl(${baseH + 10}, ${saturation}%, 12%)`);
  grad.addColorStop(0.4, `hsl(${baseH}, ${saturation - 15}%, 8%)`);
  grad.addColorStop(1, `hsl(${baseH - 15}, ${saturation - 25}%, 4%)`);
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0, 0, w, h);

  // Subtle particle field
  bgCtx.save();
  for (let i = 0; i < 120; i++) {
    const x = ((i * 137.508 + bgTime * 20) % w);
    const y = ((i * 97.3 + Math.sin(bgTime + i * 0.5) * 30) % h);
    const alpha = 0.08 + Math.sin(bgTime * 2 + i) * 0.04;
    const size = 1 + Math.sin(i * 0.3) * 0.5;
    bgCtx.beginPath();
    bgCtx.arc(x, y, size, 0, Math.PI * 2);
    bgCtx.fillStyle = `hsla(${baseH + 30}, 60%, 70%, ${alpha})`;
    bgCtx.fill();
  }
  bgCtx.restore();

  // Economic pulse waves
  const pulseAlpha = 0.015 + avgMarketChange * 0.003;
  for (let ring = 0; ring < 3; ring++) {
    const r = ((bgTime * 80 + ring * 200) % (w * 0.8));
    bgCtx.beginPath();
    bgCtx.arc(w * 0.5, h * 0.5, r, 0, Math.PI * 2);
    bgCtx.strokeStyle = `hsla(${baseH + 20}, 50%, 50%, ${Math.max(0, pulseAlpha * (1 - r / (w * 0.8)))})`;
    bgCtx.lineWidth = 1;
    bgCtx.stroke();
  }

  requestAnimationFrame(drawBackground);
}
drawBackground();

// Health indicator
const healthDot = document.getElementById('healthDot');
const healthVal = document.getElementById('healthValue');
healthVal.textContent = `+${weightedGrowth.toFixed(1)}%`;
healthDot.style.color = weightedGrowth > 2 ? '#22d3ee' : weightedGrowth > 0 ? '#facc15' : '#f43f5e';
healthDot.style.background = healthDot.style.color;

// ===================== TICKER =====================
function buildTicker() {
  const track = document.getElementById('tickerTrack');
  let html = '';
  const items = [...MARKETS, ...MARKETS]; // duplicate for seamless scroll
  items.forEach(m => {
    const cls = m.change >= 0 ? 'up' : 'down';
    const sign = m.change >= 0 ? '+' : '';
    const val = m.value >= 10000 ? m.value.toLocaleString() : m.value.toFixed(2);
    html += `<span class="ticker-item">
      <span class="ticker-name">${m.name}</span>
      <span class="ticker-value">${val}</span>
      <span class="ticker-change ${cls}">${sign}${m.change.toFixed(2)}%</span>
    </span>
    <span class="ticker-item ticker-sep">│</span>`;
  });
  track.innerHTML = html;
}
buildTicker();

// ===================== COUNTRY LIST =====================
let sortMode = 'gdp';
function setSortMode(mode) {
  sortMode = mode;
  document.querySelectorAll('.panel-toggle button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderCountryList();
}

function renderCountryList() {
  const list = document.getElementById('countryList');
  const sorted = [...COUNTRIES].sort((a, b) =>
    sortMode === 'gdp' ? b.gdp - a.gdp : b.growth - a.growth
  );
  list.innerHTML = sorted.slice(0, 30).map((c, i) => {
    const col = growthToColor(c.growth);
    const sign = c.growth >= 0 ? '+' : '';
    return `<div class="country-row" data-code="${c.code}" onmouseenter="highlightCountry('${c.code}')" onmouseleave="unhighlightCountry()">
      <span class="country-rank">${i + 1}</span>
      <span class="country-name">${c.name}</span>
      <span class="country-gdp">$${(c.gdp / 1000).toFixed(1)}T</span>
      <span class="country-growth" style="background: rgba(${col.r},${col.g},${col.b},0.15); color: ${col.hex}">${sign}${c.growth}%</span>
    </div>`;
  }).join('');
}
renderCountryList();

// ===================== MARKET GRID =====================
function renderMarkets() {
  const grid = document.getElementById('marketGrid');
  grid.innerHTML = MARKETS.map(m => {
    const cls = m.change >= 0 ? 'up' : 'down';
    const sign = m.change >= 0 ? '+' : '';
    const col = m.change >= 0 ? '#22d3ee' : '#f43f5e';
    return `<div class="market-row">
      <div>
        <div class="market-name">${m.name}</div>
        <div class="market-region">${m.region}</div>
      </div>
      <div class="market-price">${m.value.toLocaleString()}</div>
      <div class="market-change" style="color:${col}">${sign}${m.change.toFixed(2)}%</div>
    </div>`;
  }).join('');
}
renderMarkets();

// ===================== TIMESTAMP =====================
document.getElementById('timestamp').textContent =
  `DATA AS OF ${new Date().toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' }).toUpperCase()} — SOURCES: IMF WEO, XINHUA`;

// ===================== THREE.JS 3D GLOBE =====================
const canvas = document.getElementById('globe-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 4.2);

// Lights
const ambientLight = new THREE.AmbientLight(0x334466, 0.6);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0x88bbff, 0.8);
dirLight.position.set(5, 3, 5);
scene.add(dirLight);
const backLight = new THREE.DirectionalLight(0x223355, 0.3);
backLight.position.set(-5, -2, -5);
scene.add(backLight);

// Globe sphere — wireframe
const globeRadius = 1.5;
const globeGeo = new THREE.SphereGeometry(globeRadius, 64, 48);
const globeMat = new THREE.MeshPhongMaterial({
  color: 0x0a1628,
  transparent: true,
  opacity: 0.4,
  wireframe: false,
  shininess: 30,
});
const globe = new THREE.Mesh(globeGeo, globeMat);
scene.add(globe);

// Grid lines
const gridMat = new THREE.LineBasicMaterial({ color: 0x1e3a5f, transparent: true, opacity: 0.15 });
// Latitude lines
for (let lat = -60; lat <= 60; lat += 30) {
  const pts = [];
  for (let lon = 0; lon <= 360; lon += 3) {
    pts.push(latLonToVec3(lat, lon, globeRadius * 1.002));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  scene.add(new THREE.Line(geo, gridMat));
}
// Longitude lines
for (let lon = 0; lon < 360; lon += 30) {
  const pts = [];
  for (let lat = -90; lat <= 90; lat += 3) {
    pts.push(latLonToVec3(lat, lon, globeRadius * 1.002));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  scene.add(new THREE.Line(geo, gridMat));
}

// Atmosphere glow
const atmosGeo = new THREE.SphereGeometry(globeRadius * 1.12, 64, 48);
const atmosMat = new THREE.ShaderMaterial({
  vertexShader: `
    varying vec3 vNormal;
    void main() {
      vNormal = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec3 vNormal;
    void main() {
      float intensity = pow(0.65 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
      gl_FragColor = vec4(0.22, 0.74, 0.97, intensity * 0.4);
    }
  `,
  side: THREE.BackSide,
  blending: THREE.AdditiveBlending,
  transparent: true,
});
scene.add(new THREE.Mesh(atmosGeo, atmosMat));

// Country data points — 3D bars extruded from globe surface
const countryMeshes = [];
const countryGroup = new THREE.Group();
scene.add(countryGroup);

COUNTRIES.forEach(c => {
  const pos = latLonToVec3(c.lat, c.lon, globeRadius);
  const normal = pos.clone().normalize();

  // Bar height based on GDP (log scale for visual balance)
  const maxBarHeight = 0.6;
  const barHeight = Math.max(0.02, (Math.log10(c.gdp + 1) / Math.log10(31000)) * maxBarHeight);

  // Bar width based on population (subtle)
  const barWidth = Math.max(0.012, Math.min(0.04, Math.sqrt(c.pop / 1440) * 0.04));

  const color = growthToThreeColor(c.growth);

  // Create the bar
  const barGeo = new THREE.CylinderGeometry(barWidth * 0.7, barWidth, barHeight, 8);
  barGeo.translate(0, barHeight / 2, 0);
  const barMat = new THREE.MeshPhongMaterial({
    color: color,
    emissive: color.clone().multiplyScalar(0.3),
    transparent: true,
    opacity: 0.85,
    shininess: 60,
  });
  const bar = new THREE.Mesh(barGeo, barMat);

  // Position and orient bar to point outward from globe
  bar.position.copy(pos);
  bar.lookAt(pos.clone().add(normal));
  bar.rotateX(Math.PI / 2);

  bar.userData = { country: c, baseHeight: barHeight };
  countryGroup.add(bar);
  countryMeshes.push(bar);

  // Base glow dot
  const dotGeo = new THREE.SphereGeometry(barWidth * 1.5, 12, 8);
  const dotMat = new THREE.MeshBasicMaterial({
    color: color,
    transparent: true,
    opacity: 0.5,
  });
  const dot = new THREE.Mesh(dotGeo, dotMat);
  dot.position.copy(pos.clone().multiplyScalar(1.001));
  countryGroup.add(dot);
});

// Connection arcs between major trading partners
const arcMat = new THREE.LineBasicMaterial({
  color: 0x38bdf8,
  transparent: true,
  opacity: 0.06,
});
const connections = [
  ['US', 'CN'], ['US', 'GB'], ['US', 'JP'], ['US', 'DE'], ['CN', 'JP'],
  ['CN', 'KR'], ['DE', 'FR'], ['IN', 'AE'], ['AU', 'CN'], ['BR', 'US'],
  ['GB', 'DE'], ['JP', 'KR'], ['SG', 'CN'], ['IN', 'US'],
];
connections.forEach(([a, b]) => {
  const ca = COUNTRIES.find(c => c.code === a);
  const cb = COUNTRIES.find(c => c.code === b);
  if (!ca || !cb) return;

  const p1 = latLonToVec3(ca.lat, ca.lon, globeRadius * 1.005);
  const p2 = latLonToVec3(cb.lat, cb.lon, globeRadius * 1.005);
  const mid = p1.clone().add(p2).multiplyScalar(0.5);
  const dist = p1.distanceTo(p2);
  mid.normalize().multiplyScalar(globeRadius + dist * 0.3);

  const curve = new THREE.QuadraticBezierCurve3(p1, mid, p2);
  const pts = curve.getPoints(40);
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  scene.add(new THREE.Line(geo, arcMat));
});

// ===================== INTERACTION =====================
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let rotVel = { x: 0, y: 0 };
let autoRotate = true;
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let highlightedCode = null;

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  autoRotate = false;
  prevMouse = { x: e.clientX, y: e.clientY };
});
canvas.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  if (isDragging) {
    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;
    rotVel.x = dy * 0.003;
    rotVel.y = dx * 0.003;
    prevMouse = { x: e.clientX, y: e.clientY };
  }

  // Hover detection
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(countryMeshes);
  const tooltip = document.getElementById('tooltip');
  if (hits.length > 0) {
    const c = hits[0].object.userData.country;
    if (c) {
      const col = growthToColor(c.growth);
      const sign = c.growth >= 0 ? '+' : '';
      tooltip.innerHTML = `
        <div class="tooltip-country" style="color:${col.hex}">${c.name}</div>
        <div class="tooltip-row"><span class="tooltip-key">GDP</span><span class="tooltip-val">$${(c.gdp / 1000).toFixed(1)}T</span></div>
        <div class="tooltip-row"><span class="tooltip-key">Growth</span><span class="tooltip-val" style="color:${col.hex}">${sign}${c.growth}%</span></div>
        <div class="tooltip-row"><span class="tooltip-key">Population</span><span class="tooltip-val">${c.pop}M</span></div>
      `;
      tooltip.style.left = (e.clientX + 16) + 'px';
      tooltip.style.top = (e.clientY - 20) + 'px';
      tooltip.classList.add('visible');
    }
  } else {
    tooltip.classList.remove('visible');
  }
});
canvas.addEventListener('mouseup', () => { isDragging = false; });
canvas.addEventListener('mouseleave', () => { isDragging = false; });

// Touch support
canvas.addEventListener('touchstart', e => {
  isDragging = true;
  autoRotate = false;
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (isDragging && e.touches.length === 1) {
    const dx = e.touches[0].clientX - prevMouse.x;
    const dy = e.touches[0].clientY - prevMouse.y;
    rotVel.x = dy * 0.003;
    rotVel.y = dx * 0.003;
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
}, { passive: true });
canvas.addEventListener('touchend', () => { isDragging = false; });

// Zoom
canvas.addEventListener('wheel', e => {
  camera.position.z = Math.max(2.5, Math.min(8, camera.position.z + e.deltaY * 0.003));
}, { passive: true });

// Highlight from list
function highlightCountry(code) { highlightedCode = code; }
function unhighlightCountry() { highlightedCode = null; }

// ===================== ANIMATE =====================
let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.01;

  // Auto rotate
  if (autoRotate) {
    countryGroup.rotation.y += 0.002;
    globe.rotation.y += 0.002;
  }

  // Apply drag velocity
  if (!isDragging) {
    rotVel.x *= 0.95;
    rotVel.y *= 0.95;
  }
  countryGroup.rotation.x += rotVel.x;
  countryGroup.rotation.y += rotVel.y;
  globe.rotation.x = countryGroup.rotation.x;
  globe.rotation.y = countryGroup.rotation.y;

  // Animate bars
  countryMeshes.forEach(mesh => {
    const c = mesh.userData.country;
    if (!c) return;
    const isHighlighted = highlightedCode === c.code;
    const targetOpacity = isHighlighted ? 1.0 : (highlightedCode ? 0.3 : 0.85);
    mesh.material.opacity += (targetOpacity - mesh.material.opacity) * 0.1;

    // Subtle breathing
    const breathe = 1 + Math.sin(time * 2 + c.gdp * 0.01) * 0.03;
    mesh.scale.y = breathe;

    if (isHighlighted) {
      mesh.material.emissive = growthToThreeColor(c.growth).multiplyScalar(0.6);
    } else {
      mesh.material.emissive = growthToThreeColor(c.growth).multiplyScalar(0.2);
    }
  });

  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Re-enable auto-rotate after inactivity
let autoTimer;
canvas.addEventListener('mouseup', () => {
  clearTimeout(autoTimer);
  autoTimer = setTimeout(() => { autoRotate = true; }, 5000);
});
</script>
</body>
